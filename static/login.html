<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · Análise Financeira OMIE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230a0a0b'/><text x='50' y='71' font-size='62' fill='white' text-anchor='middle' font-family='Georgia,serif' font-weight='bold'>A</text></svg>">
  <style>
    :root { --ink:#0a0a0b; --muted:#6b7177; --line:#e0e2e6; --red:#c01933; --green:#0a7d3f; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
      font-family:"Inter","Segoe UI",system-ui,-apple-system,Arial,sans-serif; color:var(--ink);
      background:
        radial-gradient(1200px 500px at 110% -10%, #f3f4f6, transparent),
        radial-gradient(900px 500px at -10% 110%, #f3f4f6, transparent), #fff; }
    .cartao { width:100%; max-width:380px; background:#fff; border:1px solid var(--line);
      border-radius:18px; box-shadow:0 14px 40px rgba(16,18,22,.12); padding:30px 28px; }
    .topo { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
    .logo { width:44px; height:44px; border-radius:12px; background:var(--ink); color:#fff;
      display:grid; place-items:center; font-weight:800; font-size:16px; }
    .topo h1 { font-size:16px; margin:0; letter-spacing:-.2px; }
    .topo .sub { font-size:12px; color:var(--muted); margin-top:1px; }
    label { display:block; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); margin:14px 0 6px; }
    input { width:100%; height:44px; border:1px solid var(--line); border-radius:10px; padding:0 12px; font-size:14px; font-family:inherit; }
    input:focus { outline:none; border-color:var(--ink); box-shadow:0 0 0 3px rgba(10,10,11,.08); }
    button { width:100%; height:46px; margin-top:22px; border:none; border-radius:11px;
      background:var(--ink); color:#fff; font-size:14.5px; font-weight:700; cursor:pointer; transition:opacity .15s, transform .15s; }
    button:hover { opacity:.9; transform:translateY(-1px); }
    button:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .erro { display:none; margin-top:16px; background:#fdebec; color:var(--red); border:1px solid var(--red);
      border-radius:10px; padding:10px 12px; font-size:13px; }
    .rodape { margin-top:20px; text-align:center; font-size:11.5px; color:var(--muted); }
    .spin { display:inline-block; width:15px; height:15px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff;
      border-radius:50%; animation:g .7s linear infinite; vertical-align:-2px; }
    @keyframes g { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <form class="cartao" id="form">
    <div class="topo">
      <div class="logo" style="font-family:Georgia,serif">A</div>
      <div><h1>Análise Financeira</h1><div class="sub">Relatórios OMIE · acesso restrito</div></div>
    </div>
    <label for="login">Usuário</label>
    <input id="login" name="login" autocomplete="username" autofocus required>
    <label for="senha">Senha</label>
    <input id="senha" name="senha" type="password" autocomplete="current-password" required>
    <div class="erro" id="erro"></div>
    <button type="submit" id="btn">Entrar</button>
    <div class="rodape">Suas credenciais OMIE ficam protegidas no servidor.</div>
  </form>
  <script>
    const form = document.getElementById("form"), btn = document.getElementById("btn"), erro = document.getElementById("erro");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      erro.style.display = "none"; btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Entrando…';
      try {
        const r = await fetch("/api/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ login: form.login.value.trim(), senha: form.senha.value }),
        });
        const j = await r.json();
        if (r.ok && j.ok) { window.location = "/"; return; }
        erro.textContent = j.erro || "Não foi possível entrar."; erro.style.display = "block";
      } catch (_) { erro.textContent = "Falha de conexão com o servidor."; erro.style.display = "block"; }
      btn.disabled = false; btn.textContent = "Entrar";
    });
  </script>
</body>
</html>
